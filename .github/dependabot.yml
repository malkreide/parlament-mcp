# Monatliche Dependency-Updates inkl. MCP-SDK (ARCH-012 — SDK-Update-Disziplin).
version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
    groups:
      mcp-sdk:
        patterns:
          - "mcp"
          - "fastmcp"
      observability:
        patterns:
          - "opentelemetry*"
          - "structlog"
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    labels:
      - "dependencies"
