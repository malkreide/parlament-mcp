name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v7

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"

      - name: Run tests
        run: |
          PYTHONPATH=src pytest tests/ -m "not live"

      - name: Lint
        run: ruff check src/ tests/

  # Subnationaler Server (openparldata-mcp) – eigenständiges Subprojekt mit
  # eigener pyproject.toml. Separater Job, damit der Bundes-Server (Job "test")
  # unberührt bleibt.
  test-openparldata:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: openparldata-mcp
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v7

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        run: PYTHONPATH=src pytest tests/

      - name: Lint
        run: ruff check src/ tests/
