name: Live API tests

# Live-Tests gegen die echte Curia-Vista-API (OPS-001). Bewusst nicht in CI bei
# jedem PR — nightly + manuell, damit API-Outages den Merge nicht blockieren.
on:
  schedule:
    - cron: "0 4 * * *"  # täglich 04:00 UTC
  workflow_dispatch:

jobs:
  live:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: pip install -e ".[dev]"
      - name: Run live tests
        run: PYTHONPATH=src pytest tests/ -m live
