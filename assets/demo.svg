<svg width="720" height="520" viewBox="0 0 720 520" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e1e2e"/>
      <stop offset="100%" stop-color="#181825"/>
    </linearGradient>
    <linearGradient id="toolGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6c63ff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#6c63ff" stop-opacity="0.05"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Window chrome -->
  <rect width="720" height="520" rx="12" fill="url(#bg)" filter="url(#shadow)"/>

  <!-- Title bar -->
  <rect width="720" height="44" rx="12" fill="#313244"/>
  <rect y="32" width="720" height="12" fill="#313244"/>
  <!-- Traffic lights -->
  <circle cx="20" cy="22" r="6" fill="#ff5f57"/>
  <circle cx="40" cy="22" r="6" fill="#ffbd2e"/>
  <circle cx="60" cy="22" r="6" fill="#28c840"/>
  <!-- Title text -->
  <text x="360" y="27" text-anchor="middle" fill="#cdd6f4" font-size="13" font-weight="500">Claude — parlament-mcp</text>

  <!-- Divider -->
  <line x1="0" y1="44" x2="720" y2="44" stroke="#45475a" stroke-width="1"/>

  <!-- ── USER MESSAGE ── -->
  <rect x="360" y="64" width="336" height="52" rx="16" fill="#6c63ff"/>
  <text x="528" y="85" text-anchor="middle" fill="#fff" font-size="13" font-weight="500">Welche Vorstösse zu KI in der</text>
  <text x="528" y="104" text-anchor="middle" fill="#e8e6ff" font-size="13">Schule sind hängig?</text>

  <!-- ── TOOL CALL BLOCK ── -->
  <rect x="24" y="136" width="672" height="86" rx="10" fill="url(#toolGrad)" stroke="#6c63ff" stroke-width="1" stroke-opacity="0.4"/>
  <!-- Tool icon + label -->
  <text x="44" y="158" fill="#6c63ff" font-size="13" font-weight="600">⚙  Tool Call</text>
  <text x="44" y="158" fill="#6c63ff" font-size="13" font-weight="600" dx="90">parlament_search_business</text>
  <!-- Parameters -->
  <rect x="44" y="168" width="632" height="1" fill="#6c63ff" fill-opacity="0.25"/>
  <text x="44" y="186" fill="#a6adc8" font-size="12" font-family="'Consolas', 'Monaco', monospace">  keyword</text>
  <text x="44" y="186" fill="#cdd6f4" font-size="12" font-family="'Consolas', 'Monaco', monospace" dx="64">= </text>
  <text x="44" y="186" fill="#a6e3a1" font-size="12" font-family="'Consolas', 'Monaco', monospace" dx="74">"KI"</text>
  <text x="44" y="186" fill="#a6adc8" font-size="12" font-family="'Consolas', 'Monaco', monospace" dx="106">keyword2</text>
  <text x="44" y="186" fill="#cdd6f4" font-size="12" font-family="'Consolas', 'Monaco', monospace" dx="168">= </text>
  <text x="44" y="186" fill="#a6e3a1" font-size="12" font-family="'Consolas', 'Monaco', monospace" dx="178">"Schule"</text>
  <text x="44" y="186" fill="#a6adc8" font-size="12" font-family="'Consolas', 'Monaco', monospace" dx="246">status</text>
  <text x="44" y="186" fill="#cdd6f4" font-size="12" font-family="'Consolas', 'Monaco', monospace" dx="290">= </text>
  <text x="44" y="186" fill="#a6e3a1" font-size="12" font-family="'Consolas', 'Monaco', monospace" dx="300">"Eingereicht"</text>
  <!-- Source badge -->
  <rect x="44" y="197" width="152" height="18" rx="4" fill="#6c63ff" fill-opacity="0.2"/>
  <text x="50" y="210" fill="#b4befe" font-size="11">ws.parlament.ch · OData v3</text>

  <!-- ── RESPONSE HEADER ── -->
  <text x="44" y="252" fill="#a6adc8" font-size="12">Claude</text>

  <!-- Response card 1 -->
  <rect x="24" y="264" width="672" height="68" rx="8" fill="#1e1e2e" stroke="#313244" stroke-width="1"/>
  <!-- Red accent -->
  <rect x="24" y="264" width="4" height="68" rx="2" fill="#89b4fa"/>
  <text x="44" y="283" fill="#cdd6f4" font-size="13" font-weight="600">## Parlamentarische Vorstösse (3 Treffer)</text>
  <text x="44" y="303" fill="#a6adc8" font-size="12">Suche: KI + Schule · Status: Eingereicht</text>
  <text x="44" y="322" fill="#585b70" font-size="11">─────────────────────────────────────────────────────────────────────</text>

  <!-- Response card 2 -->
  <rect x="24" y="342" width="672" height="78" rx="8" fill="#1e1e2e" stroke="#313244" stroke-width="1"/>
  <rect x="24" y="342" width="4" height="78" rx="2" fill="#a6e3a1"/>
  <text x="44" y="361" fill="#89b4fa" font-size="13" font-weight="600">### 26.1234 – KI-Kompetenzen in Volksschulen fördern</text>
  <text x="44" y="379" fill="#a6adc8" font-size="12">· Typ: Motion  · Status: Eingereicht (2026-03-14)  · Rat: NR</text>
  <text x="44" y="397" fill="#6c7086" font-size="12">· Eingereicht von: Muster Maria  · Departement: EDI</text>
  <text x="44" y="413" fill="#89b4fa" font-size="11">· Curia Vista: https://www.parlament.ch/de/...AffairId=20261234</text>

  <!-- Response card 3 -->
  <rect x="24" y="430" width="672" height="66" rx="8" fill="#1e1e2e" stroke="#313244" stroke-width="1"/>
  <rect x="24" y="430" width="4" height="66" rx="2" fill="#f38ba8"/>
  <text x="44" y="449" fill="#89b4fa" font-size="13" font-weight="600">### 25.4567 – Digitalisierung KI-Strategie im Schulbereich</text>
  <text x="44" y="467" fill="#a6adc8" font-size="12">· Typ: Postulat  · Status: Eingereicht (2025-12-09)  · Rat: SR</text>
  <text x="44" y="485" fill="#6c7086" font-size="12">· Eingereicht von: Beispiel Beat  · Departement: UVEK</text>
  <text x="44" y="501" fill="#585b70" font-size="11">*Weitere Ergebnisse mit `offset=20` abrufbar.*</text>

  <!-- Bottom fade -->
  <rect x="0" y="480" width="720" height="40" rx="0" fill="url(#bg)" opacity="0.6"/>
  <rect x="0" y="508" width="720" height="12" rx="0" fill="#181825"/>
  <rect x="0" y="508" width="720" height="12" rx="12" fill="#181825"/>

  <!-- Footer branding -->
  <text x="360" y="514" text-anchor="middle" fill="#45475a" font-size="11">parlament-mcp · ws.parlament.ch · kein API-Schlüssel erforderlich</text>
</svg>
