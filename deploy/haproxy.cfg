# Alternative zu K8s-Ingress: HAProxy mit Stick-Table auf Mcp-Session-Id
# (SCALE-002 / SCALE-003). Routet eine MCP-Session konsistent zum selben Backend.

frontend mcp_frontend
    bind *:443 ssl crt /etc/ssl/parlament-mcp.pem
    mode http
    default_backend mcp_backend

backend mcp_backend
    mode http
    balance roundrobin
    # 200k Sessions, 24h TTL (korreliert mit Session-Lifetime).
    stick-table type string len 64 size 200k expire 24h
    stick on hdr(Mcp-Session-Id)
    option httpchk
    http-check connect
    http-check send meth GET uri /
    server mcp1 10.0.1.1:8080 check
    server mcp2 10.0.1.2:8080 check
    server mcp3 10.0.1.3:8080 check
