# Stateful Load Balancing für Streamable HTTP (SCALE-002) +
# Mcp-Session-Id-basiertes Sticky Routing am Ingress (SCALE-003).
apiVersion: v1
kind: Service
metadata:
  name: parlament-mcp
spec:
  selector:
    app: parlament-mcp
  ports:
    - port: 80
      targetPort: 8080
  # Fallback-Affinität auf Service-Ebene.
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 3600
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: parlament-mcp
  annotations:
    # Sticky Sessions anhand des Mcp-Session-Id-Headers (SCALE-003).
    nginx.ingress.kubernetes.io/affinity: "cookie"
    nginx.ingress.kubernetes.io/session-cookie-name: "mcp-route"
    nginx.ingress.kubernetes.io/upstream-hash-by: "$http_mcp_session_id"
spec:
  rules:
    - host: parlament-mcp.example.ch
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: parlament-mcp
                port:
                  number: 80
