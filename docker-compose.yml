# Lokales Container-Deployment für HTTP-Transport.
# Port wird bewusst nur an 127.0.0.1 gebunden (SEC-016 — kein NeighborJack).
services:
  parlament-mcp:
    build: .
    image: malkreide/parlament-mcp
    restart: unless-stopped
    environment:
      MCP_TRANSPORT: streamable-http
      MCP_HOST: "0.0.0.0"   # im Container nötig; Host-Bindung unten beschränkt
      MCP_PORT: "8080"
    ports:
      - "127.0.0.1:8080:8080"   # nur lokal erreichbar
    # Resource-Limits (SCALE-006).
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
        reservations:
          memory: 128M
          cpus: "0.1"
    ulimits:
      nofile:
        soft: 4096
        hard: 8192
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
